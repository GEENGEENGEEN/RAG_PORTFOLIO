services:
  - type: web
    name: portfolio-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Pin a Python version that has prebuilt wheels for our deps.
      # Newer versions (e.g. 3.14) force a slow Rust source build that
      # fails on Render's read-only filesystem.
      - key: PYTHON_VERSION
        value: "3.12.7"
      # Set these values in the Render dashboard (kept out of git).
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
